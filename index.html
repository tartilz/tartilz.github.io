<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f8f9fa;
            color: #2c3e50;
            line-height: 1.6;
        }

        /* Header Styles */
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            perspective: 1000px;
        }

        .logo span {
            display: inline-block;
            animation: flip 2s infinite;
            transform-style: preserve-3d;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(360deg); }
            100% { transform: rotateY(360deg); }
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        nav a:hover {
            color: #3498db;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            padding: 6rem 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Featured Books */
        .featured-books {
            padding: 4rem 2rem;
        }

        .books-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
            color: #2c3e50;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .book-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .book-cover {
            height: 250px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .book-info {
            padding: 1.5rem;
        }

        .book-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        .book-author {
            color: #7f8c8d;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .read-btn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .read-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        /* Floating Rounded Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 3rem;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            background: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #4b5563;
        }

        .page-btn.active {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
            transform: translateY(-3px);
        }

        .page-btn:hover:not(.active) {
            background: #f3f4f6;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* Password Modal */
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .password-content {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 2.5rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .password-content h3 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .password-content input {
            width: 100%;
            padding: 12px 20px;
            margin: 1.5rem 0;
            border: 2px solid #3498db;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .password-content input:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .unlock-btn {
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
        }

        .unlock-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            background: #2c3e50;
            color: white;
            padding: 3rem 2rem;
            margin-top: 4rem;
            text-align: center;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            nav ul {
                justify-content: center;
            }

            .hero {
                padding: 4rem 1rem;
            }

            .hero h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .book-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="header-container">
            <div class="logo">
                <span>B</span><span>o</span><span>o</span><span>k</span><span>H</span><span>u</span><span>b</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#membership">Membership</a></li>
                    <li><a href="#featured">Featured</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Your Digital Library</h1>
            <p>Access exclusive books</p>
        </div>
    </section>

    <!-- Featured Books Section -->
    <section class="featured-books" id="featured">
        <div class="books-container">
            <h2 class="section-title">Featured Collection</h2>
            <div class="book-grid" id="bookGrid"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <!-- Password Modal -->
    <div class="password-modal" id="passwordModal">
        <div class="password-content">
            <h3>Premium Access Required</h3>
            <input type="password" id="passkeyInput" placeholder="Enter your passkey">
            <button class="unlock-btn" onclick="validatePasskey()">Unlock Book</button>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2025 BookHub. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Book Data - Add new books at the TOP of this array
        let books = [
            {
                id: 6,
                title: "Advanced Quantum Physics",
                author: "Dr. Lisa Randall",
                image: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                url: "/read/quantum-physics",
            },
            {
                id: 5,
                title: "AI Revolution",
                author: "Andrew Ng",
                image: "https://images.unsplash.com/photo-1677442135136-760c81364e7f?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                url: "/read/ai-revolution",
            },
            {
                id: 4,
                title: "Modern Philosophy",
                author: "Daniel Dennett",
                image: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                url: "/read/modern-philosophy",
            },
            {
                id: 3,
                title: "Climate Solutions",
                author: "Bill Gates",
                image: "https://images.unsplash.com/photo-1615751072497-5f5169febe17?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                url: "/read/climate-solutions",
            },
            {
                id: 2,
                title: "Economic Theories",
                author: "Thomas Piketty",
                image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                url: "/read/economic-theories",
            },
            {
                id: 1,
                title: "Ancient History",
                author: "Mary Beard",
                image: "https://images.unsplash.com/photo-1471623817296-aa07ae5c9f47?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                url: "/read/ancient-history",
            }
        ];

        // Pagination Settings
        const booksPerPage = 4;
        let currentPage = 1;
        let currentBookUrl = "";

        // Generate Book Cards
        function generateBookCard(book) {
            return `
                <div class="book-card">
                    <div class="book-cover" style="background-image: url('${book.image}')"></div>
                    <div class="book-info">
                        <h3 class="book-title">${book.title}</h3>
                        <p class="book-author">by ${book.author}</p>
                        <button class="read-btn" 
                            onclick="showPasswordModal('${book.url}')">
                            Read Now
                        </button>
                    </div>
                </div>
            `;
        }

        // Update Pagination
        function updatePagination() {
            const totalPages = Math.ceil(books.length / booksPerPage);
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';

            for(let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => changePage(i);
                paginationDiv.appendChild(btn);
            }
        }

        // Change Page
        function changePage(page) {
            currentPage = page;
            const start = (page - 1) * booksPerPage;
            const end = start + booksPerPage;
            
            document.getElementById('bookGrid').innerHTML = books
                .slice(start, end)
                .map(book => generateBookCard(book))
                .join('');
            
            updatePagination();
        }

        // Password Modal Functions
        function showPasswordModal(url) {
            currentBookUrl = url;
            document.getElementById('passwordModal').style.display = 'block';
        }

        function validatePasskey() {
            const input = document.getElementById('passkeyInput').value.trim();
            // Check if passkey starts with T and ends with 7
            if(input.startsWith('T') && input.endsWith('7')) {
                window.location.href = currentBookUrl;
            } else {
                window.location.href = "https://mub.me/tartilz";
            }
            document.getElementById('passwordModal').style.display = 'none';
        }

        // Close Modal
        window.onclick = function(event) {
            if(event.target == document.getElementById('passwordModal')) {
                document.getElementById('passwordModal').style.display = 'none';
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            // Sort books by ID (newest first)
            books.sort((a, b) => b.id - a.id);
            changePage(1);
            
            // Close modal on ESC key
            document.addEventListener('keydown', (e) => {
                if(e.key === 'Escape') {
                    document.getElementById('passwordModal').style.display = 'none';
                }
            });
        });
    </script>
</body>
  </html>
