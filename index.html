<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHub - Premium Reading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e0e7ff;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
            position: relative;
            transition: background 0.3s, color 0.3s;
        }

        body.light-theme {
            background: linear-gradient(135deg, #e0e7ff, #c3cfe2);
            color: #1a1a2e;
        }

        /* Parallax Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.1), transparent);
            z-index: -1;
            animation: parallax 20s linear infinite;
        }

        @keyframes parallax {
            0% { transform: translateY(0); }
            100% { transform: translateY(-1000px); }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Preloader */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }

        .preloader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            border: 8px solid #3498db;
            border-top: 8px solid #25D366;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Header */
        header {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease;
        }

        body.light-theme header {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(37, 211, 102, 0.5); }
            50% { text-shadow: 0 0 20px rgba(37, 211, 102, 0.8); }
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-bar {
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #e0e7ff;
            width: 250px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        body.light-theme .search-bar {
            background: #ffffff;
            color: #1a1a2e;
        }

        .search-bar:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }

        .theme-toggle {
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }

        body.light-theme .theme-toggle {
            background: linear-gradient(45deg, #3498db, #2980b9);
        }

        .theme-toggle:hover {
            transform: rotate(360deg);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Featured Books */
        .featured-books {
            padding: 4rem 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
            font-size: 3rem;
            position: relative;
            text-transform: uppercase;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 2s ease-in-out infinite;
        }

        /* Book Grid */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .book-grid.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Book Card */
        .book-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            backdrop-filter: blur(15px);
            border: 2px solid transparent;
            cursor: pointer;
        }

        .book-card:hover {
            transform: scale(1.05) rotateY(5deg) rotateX(3deg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: #25D366;
        }

        body.light-theme .book-card {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        .book-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .book-card:hover img {
            transform: scale(1.1);
        }

        .book-info {
            padding: 25px;
            text-align: center;
        }

        .book-info h3 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .book-info p {
            font-size: 1.1rem;
            color: #b8c6db;
        }

        body.light-theme .book-info p {
            color: #4b5563;
        }

        /* Read Now Button */
        .read-now {
            display: inline-block;
            margin: 20px 0;
            padding: 14px 30px;
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
            font-weight: 600;
            text-transform: uppercase;
        }

        .read-now:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.5);
        }

        .read-now .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 4rem;
            position: relative;
        }

        .page-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: #e0e7ff;
            border: 2px solid #3498db;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        body.light-theme .page-btn {
            background: #ffffff;
            color: #1a1a2e;
            border: 2px solid #3498db;
        }

        .page-btn:hover {
            background: #25D366;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
        }

        .page-btn.active {
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
            transform: scale(1.2);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.7);
        }

        /* Book Details Modal */
        .book-details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.5s ease-in-out;
        }

        .book-details-content {
            background: rgba(255, 255, 255, 0.1);
            max-width: 650px;
            margin: 10% auto;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: zoomIn 0.5s ease-in-out;
            backdrop-filter: blur(15px);
            border: 2px solid #25D366;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.5);
        }

        body.light-theme .book-details-content {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #3498db;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
        }

        .book-details-content img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #3498db;
        }

        .book-details-content h3 {
            font-size: 2rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .book-details-content p {
            font-size: 1.1rem;
            color: #b8c6db;
            margin-bottom: 25px;
        }

        body.light-theme .book-details-content p {
            color: #4b5563;
        }

        .book-details-content .read-now {
            width: 100%;
        }

        /* Password Modal */
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.5s ease-in-out;
        }

        .password-content {
            background: rgba(255, 255, 255, 0.1);
            max-width: 500px;
            margin: 15% auto;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: zoomIn 0.5s ease-in-out;
            backdrop-filter: blur(15px);
            border: 2px solid #25D366;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.5);
        }

        body.light-theme .password-content {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #3498db;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
        }

        .password-content h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .password-content input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: 2px solid transparent;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #e0e7ff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        body.light-theme .password-content input {
            background: #ffffff;
            color: #1a1a2e;
        }

        .password-content input:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.5);
        }

        .unlock-btn {
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
            text-transform: uppercase;
        }

        .unlock-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.5);
        }

        .error {
            color: #ff4757;
            font-size: 1rem;
            margin-top: 15px;
            animation: shake 0.5s;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
            border: none;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
        }

        .back-to-top:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.7);
        }

        .back-to-top svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* Chatbot Styles */
        .chatbot-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .chatbot-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(45deg, #25D366, #3498db);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.7);
            position: relative;
            animation: orbit 4s linear infinite;
        }

        .chatbot-icon::before {
            content: '';
            position: absolute;
            width: 90px;
            height: 90px;
            border: 2px solid rgba(37, 211, 102, 0.3);
            border-radius: 50%;
            animation: orbitGlow 2s ease-in-out infinite;
        }

        @keyframes orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes orbitGlow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .chatbot-icon:hover {
            transform: scale(1.2);
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.9);
        }

        .chatbot-icon svg {
            width: 35px;
            height: 35px;
            fill: white;
            transform: rotate(45deg);
            transition: transform 0.3s ease;
        }

        .chatbot-icon:hover svg {
            transform: rotate(0deg);
        }

        .chat-window {
            width: 380px;
            height: 550px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            display: none;
            flex-direction: column;
            transform: translateY(50px);
            opacity: 0;
            transition: all 0.5s ease;
            position: absolute;
            bottom: 90px;
            right: 0;
            overflow: hidden;
            backdrop-filter: blur(15px);
            border: 2px solid #25D366;
        }

        .chat-window.active {
            display: flex;
            transform: translateY(0);
            opacity: 1;
            animation: fadeInUp 0.5s ease;
        }

        .chat-header {
            background: linear-gradient(135deg, #25D366, #3498db);
            color: white;
            padding: 20px;
            border-radius: 25px 25px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .chat-header span {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .chat-header::after {
            content: 'Online';
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            animation: pulseStatus 2s infinite;
        }

        @keyframes pulseStatus {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.1); }
        }

        .chat-body {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: #25D366 rgba(255, 255, 255, 0.05);
        }

        .chat-body::-webkit-scrollbar {
            width: 8px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-body::-webkit-scrollbar-thumb {
            background-color: #25D366;
            border-radius: 10px;
        }

        .chat-message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.4s ease;
            border: 1px solid transparent;
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border-color: #25D366;
        }

        .user-message {
            background: linear-gradient(45deg, #25D366, #3498db);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            color: #fff;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-reply {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 20px;
            margin: 6px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            border: 1px solid #3498db;
        }

        .quick-reply:hover {
            background: #25D366;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.5);
            border-color: transparent;
            color: #fff;
        }

        .chat-input-container {
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0 0 25px 25px;
            display: flex;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid transparent;
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
            margin-right: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #e0e7ff;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: #25D366;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.5);
        }

        .send-btn {
            background: linear-gradient(45deg, #25D366, #3498db);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .close-btn {
            cursor: pointer;
            padding: 8px;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .close-btn:hover {
            transform: rotate(180deg);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            align-self: flex-start;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
        }

        .typing-dot {
            width: 10px;
            height: 10px;
            background: #25D366;
            border-radius: 50%;
            margin: 0 4px;
            animation: orbitDot 1.5s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.3s; }
        .typing-dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes orbitDot {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.3); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .book-grid {
                grid-template-columns: 1fr;
            }

            .chat-window {
                width: 340px;
                height: 500px;
            }

            .header-controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-bar {
                width: 100%;
            }

            .book-details-content {
                margin: 20% 15px;
                padding: 25px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.8rem;
            }

            .book-card img {
                height: 300px;
            }

            .chat-window {
                width: 320px;
                right: 10px;
                height: 460px;
            }

            .section-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="loader"></div>
    </div>

    <!-- Book Details Modal -->
    <div class="book-details-modal" id="bookDetailsModal">
        <div class="book-details-content">
            <img id="detailImage" src="" alt="">
            <h3 id="detailTitle"></h3>
            <p id="detailAuthor"></p>
            <p id="detailDescription"></p>
            <button class="read-now" onclick="showPasswordModal()">Read Now</button>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="password-modal" id="passwordModal">
        <div class="password-content">
            <h3>Premium Access Required</h3>
            <input type="password" id="passkeyInput" placeholder="Enter your passkey" aria-label="Passkey">
            <p id="errorMessage" class="error">Invalid Passkey!</p>
            <button class="unlock-btn" onclick="validatePasskey()">Unlock Book</button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">BookHub</div>
            <div class="header-controls">
                <input type="text" class="search-bar" id="searchBar" placeholder="Search books..." aria-label="Search books">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme" aria-label="Toggle theme">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <section class="featured-books" id="featured">
            <h2 class="section-title">Featured Collection</h2>
            <div class="book-grid" id="bookGrid"></div>
            <div class="pagination" id="pagination"></div>
        </section>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <svg viewBox="0 0 24 24">
            <path d="M12 4l-8 8h6v8h4v-8h6z"/>
        </svg>
    </button>

    <!-- Chatbot -->
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-icon" id="chatbotIcon" aria-label="Open chatbot">
            <svg viewBox="0 0 24 24">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
        </div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span>BookHub Assistant</span>
                <div class="close-btn" id="closeChat" aria-label="Close chatbot">×</div>
            </div>
            <div class="chat-body" id="chatBody"></div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="userInput" placeholder="Type your message..." aria-label="Chat input">
                <button class="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Book Data (Newest to Oldest, IDs 16 to 11)
        const books = [
            {
                id: 16,
                title: "Whispers in the Wind",
                author: "Sarah Black",
                image: "https://images.unsplash.com/photo-1509266272358-7701da638078",
                redirectUrl: "https://mub.me/tartilz",
                description: "A captivating tale of love and mystery set against a backdrop of stormy seas."
            },
            {
                id: 15,
                title: "Echoes of Time",
                author: "Michael Green",
                image: "https://images.unsplash.com/photo-1521038199265-bdfe69883c66",
                redirectUrl: "https://mub.me/tartilz",
                description: "A thrilling sci-fi adventure exploring the boundaries of time and space."
            },
            {
                id: 14,
                title: "Secrets of the Deep",
                author: "Emily White",
                image: "https://images.unsplash.com/photo-1491841573634-28140fc7ced7",
                redirectUrl: "https://mub.me/tartilz",
                description: "Dive into an underwater world filled with secrets and ancient mysteries."
            },
            {
                id: 13,
                title: "Journey to the Stars",
                author: "Alex Brown",
                image: "https://images.unsplash.com/photo-1532012197267-da84d127e765",
                redirectUrl: "https://mub.me/tartilz",
                description: "An epic space odyssey about humanity's quest for the stars."
            },
            {
                id: 12,
                title: "Mystery of the Night",
                author: "Jane Smith",
                image: "https://images.unsplash.com/photo-1516979187457-6376e861a200",
                redirectUrl: "https://mub.me/tartilz",
                description: "A gripping mystery that unfolds under the cover of darkness."
            },
            {
                id: 11,
                title: "The Great Adventure",
                author: "John Doe",
                image: "https://images.unsplash.com/photo-1544716278-ca5e3f4eb13d",
                redirectUrl: "https://mub.me/tartilz",
                description: "A true story of courage and exploration in uncharted territories."
            }
        ].sort((a, b) => b.id - a.id); // Sort by ID descending (newest first)

        // Pagination Variables
        const booksPerPage = 4;
        let currentPage = 1;
        let filteredBooks = [...books];
        const bookGrid = document.getElementById('bookGrid');
        const pagination = document.getElementById('pagination');

        // Display Books for Current Page
        function displayBooks(page) {
            bookGrid.classList.remove('active');
            requestAnimationFrame(() => {
                setTimeout(() => {
                    bookGrid.innerHTML = '';
                    const start = (page - 1) * booksPerPage;
                    const end = start + booksPerPage;
                    const paginatedBooks = filteredBooks.slice(start, end);

                    if (paginatedBooks.length === 0) {
                        bookGrid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; font-size: 1.2rem;">No books found.</p>';
                    } else {
                        paginatedBooks.forEach(book => {
                            const bookCard = document.createElement('div');
                            bookCard.className = 'book-card animate__animated animate__fadeIn';
                            bookCard.dataset.id = book.id;
                            bookCard.innerHTML = `
                                <img src="${book.image}" alt="${book.title}">
                                <div class="book-info">
                                    <h3>${book.title}</h3>
                                    <p>${book.author}</p>
                                    <button class="read-now" onclick="showBookDetails(${book.id})">Read Now</button>
                                </div>
                            `;
                            bookGrid.appendChild(bookCard);
                        });
                    }

                    bookGrid.classList.add('active');
                    addRippleEffect();
                }, 600);
            });
        }

        // Create Pagination Buttons
        function setupPagination() {
            pagination.innerHTML = '';
            const pageCount = Math.ceil(filteredBooks.length / booksPerPage);

            for (let i = 1; i <= pageCount; i++) {
                const button = document.createElement('button');
                button.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                button.textContent = i;
                button.setAttribute('aria-label', `Page ${i}`);
                button.addEventListener('click', () => {
                    currentPage = i;
                    displayBooks(currentPage);
                    updatePagination();
                });
                pagination.appendChild(button);
            }
        }

        // Update Pagination Active State
        function updatePagination() {
            const buttons = pagination.querySelectorAll('.page-btn');
            buttons.forEach((button, index) => {
                button.classList.toggle('active', index + 1 === currentPage);
            });
        }

        // Ripple Effect for Buttons
        function addRippleEffect() {
            document.querySelectorAll('.read-now, .unlock-btn').forEach(button => {
                button.addEventListener('click', function(e) {
                    const rect = this.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    ripple.style.left = `${x}px`;
                    ripple.style.top = `${y}px`;
                    this.appendChild(ripple);

                    setTimeout(() => ripple.remove(), 600);
                });
            });
        }

        // Search Functionality
        const searchBar = document.getElementById('searchBar');
        searchBar.addEventListener('input', debounce(() => {
            const query = searchBar.value.trim().toLowerCase();
            filteredBooks = books.filter(book =>
                book.title.toLowerCase().includes(query) ||
                book.author.toLowerCase().includes(query)
            );
            currentPage = 1;
            displayBooks(currentPage);
            setupPagination();
        }, 300));

        // Debounce Function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Book Details Modal
        const bookDetailsModal = document.getElementById('bookDetailsModal');
        let currentBookId = null;

        function showBookDetails(bookId) {
            const book = books.find(b => b.id === bookId);
            if (book) {
                currentBookId = bookId;
                document.getElementById('detailImage').src = book.image;
                document.getElementById('detailImage').alt = book.title;
                document.getElementById('detailTitle').textContent = book.title;
                document.getElementById('detailAuthor').textContent = `by ${book.author}`;
                document.getElementById('detailDescription').textContent = book.description;
                bookDetailsModal.style.display = 'block';
            }
        }

        // Password Modal Logic
        const passwordModal = document.getElementById('passwordModal');
        const passkeyInput = document.getElementById('passkeyInput');
        const errorMessage = document.getElementById('errorMessage');

        function showPasswordModal() {
            bookDetailsModal.style.display = 'none';
            passwordModal.style.display = 'block';
            passkeyInput.value = '';
            errorMessage.style.display = 'none';
            passkeyInput.focus();
        }

        function validatePasskey() {
            const passkey = passkeyInput.value.trim();
            if (passkey.startsWith('T') && passkey.endsWith('7')) {
                const book = books.find(b => b.id === currentBookId);
                if (book) {
                    window.location.href = book.redirectUrl;
                }
            } else {
                errorMessage.style.display = 'block';
                errorMessage.classList.add('animate__animated', 'animate__shakeX');
                passkeyInput.classList.add('error');
                setTimeout(() => {
                    errorMessage.classList.remove('animate__animated', 'animate__shakeX');
                    passkeyInput.classList.remove('error');
                }, 500);
            }
        }

        // Close Modals on Outside Click
        window.onclick = function(event) {
            if (event.target === bookDetailsModal) {
                bookDetailsModal.style.display = 'none';
            }
            if (event.target === passwordModal) {
                passwordModal.style.display = 'none';
            }
        };

        // Handle Enter Key for Passkey
        passkeyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validatePasskey();
        });

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        });

        // Load Theme Preference
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        // Back to Top Button
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.style.display = window.scrollY > 300 ? 'flex' : 'none';
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Preloader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 1000);
        });

        // Chatbot Logic
        let chatState = {
            step: 'email',
            email: '',
            problem: '',
            history: []
        };

        const commonProblems = [
            { label: "Passkey not working", value: "passkey" },
            { label: "Membership issues", value: "membership" },
            { label: "Can't access books", value: "access" },
            { label: "Payment problems", value: "payment" },
            { label: "Other issue", value: "other" }
        ];

        // Toggle Chat Window
        const chatbotIcon = document.getElementById('chatbotIcon');
        const chatWindow = document.getElementById('chatWindow');

        chatbotIcon.addEventListener('click', () => {
            chatWindow.classList.add('active');
            chatbotIcon.style.display = 'none';
            updateChatDisplay();
            if (chatState.history.length === 0) {
                addBotMessage('🚀 Welcome to BookHub Assistant! Please provide your email address:');
            }
        });

        // Close Chat
        document.getElementById('closeChat').addEventListener('click', () => {
            chatWindow.classList.remove('active');
            chatbotIcon.style.display = 'flex';
        });

        // Chat Display
        function updateChatDisplay() {
            const chatBody = document.getElementById('chatBody');
            chatBody.innerHTML = chatState.history.map(msg => `
                <div class="chat-message ${msg.type}-message">
                    ${msg.text}
                </div>
            `).join('');
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function showTypingIndicator() {
            const chatBody = document.getElementById('chatBody');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatBody.appendChild(typingDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
            return typingDiv;
        }

        function hideTypingIndicator(typingDiv) {
            typingDiv.remove();
        }

        function addBotMessage(text, isQuickReply = false) {
            if (isQuickReply) {
                const quickReplies = commonProblems.map(problem => `
                    <div class="quick-reply" onclick="handleQuickReply('${problem.value}')">
                        ${problem.label}
                    </div>
                `).join('');
                chatState.history.push({
                    type: 'bot',
                    text: text + '<div style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px;">' + quickReplies + '</div>'
                });
            } else {
                chatState.history.push({
                    type: 'bot',
                    text: text
                });
            }
            updateChatDisplay();
        }

        function addUserMessage(text) {
            chatState.history.push({
                type: 'user',
                    text: text
                });
                updateChatDisplay();
            }

            function handleQuickReply(value) {
                const problem = commonProblems.find(p => p.value === value);
                if (problem) {
                    if (value === 'other') {
                        addUserMessage('I have another issue');
                        const typingDiv = showTypingIndicator();
                        setTimeout(() => {
                            hideTypingIndicator(typingDiv);
                            addBotMessage('Please describe your issue in detail:');
                            chatState.step = 'other_issue';
                        }, 1000);
                    } else {
                        addUserMessage(problem.label);
                        chatState.problem = value;
                        const typingDiv = showTypingIndicator();
                        setTimeout(() => {
                            hideTypingIndicator(typingDiv);
                            addBotMessage(`For ${problem.label.toLowerCase()}, please contact support@bookhub.com with your membership details. Anything else I can help with?`, true);
                            chatState.step = 'followup';
                        }, 1500);
                    }
                }
            }

            function sendMessage() {
                const userInput = document.getElementById('userInput');
                const message = userInput.value.trim();
                
                if (!message) {
                    addBotMessage('Please type a message to continue.');
                    return;
                }

                addUserMessage(message);
                userInput.value = '';
                const typingDiv = showTypingIndicator();

                setTimeout(() => {
                    hideTypingIndicator(typingDiv);
                    if (chatState.step === 'email') {
                        if (message.includes('@')) {
                            chatState.email = message;
                            addBotMessage('Thanks! What issue are you experiencing?', true);
                            chatState.step = 'problem';
                        } else {
                            addBotMessage('Please enter a valid email address:');
                        }
                    } else if (chatState.step === 'problem') {
                        handleQuickReply('other');
                    } else if (chatState.step === 'other_issue') {
                        addBotMessage(`Thank you for the details. Our team will contact you at ${chatState.email} within 24 hours. Anything else?`, true);
                        chatState.step = 'followup';
                    } else if (chatState.step === 'followup') {
                        if (message.toLowerCase().includes('no') || message.toLowerCase().includes('thank')) {
                            addBotMessage('You\'re welcome! Have a great day! 🌟');
                            setTimeout(() => {
                                chatWindow.classList.remove('active');
                                chatbotIcon.style.display = 'flex';
                            }, 2000);
                        } else {
                            addBotMessage('How else can I assist you?', true);
                        }
                    }
                }, 1500);
            }

            // Handle Enter Key in Chat
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // Initialize
            displayBooks(currentPage);
            setupPagination();
        </script>
    </body>
  </html>
