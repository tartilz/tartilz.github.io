<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHub - Premium Reading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0e7ff, #c3cfe2);
            color: #1a1a2e;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
            position: relative;
            min-height: 100vh;
        }

        /* Parallax Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.1), transparent);
            z-index: -1;
            animation: parallax 20s linear infinite;
        }

        @keyframes parallax {
            0% { transform: translateY(0); }
            100% { transform: translateY(-1000px); }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            animation: fadeInDown 0.8s ease;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(37, 211, 102, 0.5); }
            50% { text-shadow: 0 0 20px rgba(37, 211, 102, 0.8); }
        }

        .header-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .search-bar {
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a2e;
            width: 100%;
            max-width: 350px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.5);
            background: #f0f2f5;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: #1a1a2e;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            background: #25D366;
            color: #fff;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.5);
        }

        .nav-links a.active {
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
        }

        /* Featured Books */
        .featured-books {
            padding: 4rem 0;
            min-height: 80vh;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
            font-size: 3rem;
            text-transform: uppercase;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 2s ease-in-out infinite;
        }

        /* Book Grid */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            justify-content: center;
            min-height: 400px;
        }

        .book-grid.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Book Card */
        .book-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border: 2px solid transparent;
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: scale(1.05) rotateY(5deg) rotateX(3deg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border-color: #25D366;
        }

        .book-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .book-card:hover img {
            transform: scale(1.1);
        }

        .book-info {
            padding: 25px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .book-info h3 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .book-info p {
            font-size: 1.1rem;
            color: #4b5563;
        }

        /* Read Now Button */
        .read-now {
            display: inline-block;
            margin: 20px 0 0;
            padding: 14px 30px;
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
            font-weight: 600;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        .read-now:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.5);
        }

        .read-now .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Pagination */
        .pagination-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 4rem;
            background: #1a1a2e;
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
            animation: fadeInUp 0.5s ease;
            flex-wrap: wrap;
        }

        .nav-arrow {
            font-size: 1.5rem;
            color: #fff;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px 15px;
            transition: transform 0.3s ease;
            min-width: 50px;
        }

        .nav-arrow:disabled {
            color: #666;
            cursor: not-allowed;
        }

        .nav-arrow:hover:not(:disabled) {
            transform: scale(1.2);
            color: #25D366;
        }

        .page-info {
            color: #fff;
            font-size: 1.2rem;
            margin: 0 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .page-info .current-page {
            background: #25D366;
            color: #fff;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: 700;
            transition: transform 0.3s ease;
        }

        .page-info .total-pages {
            color: #d1d8e0;
        }

        /* Book Details Modal */
        .book-details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.5s ease-in-out;
        }

        .book-details-content {
            background: rgba(255, 255, 255, 0.95);
            max-width: 650px;
            margin: 10% auto;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: zoomIn 0.5s ease-in-out;
            border: 2px solid #25D366;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.5);
            position: relative;
        }

        .book-details-content img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #3498db;
        }

        .book-details-content h3 {
            font-size: 2rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .book-details-content p {
            font-size: 1.1rem;
            color: #4b5563;
            margin-bottom: 25px;
        }

        .book-details-content .read-now {
            width: 100%;
        }

        /* Password Modal */
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.5s ease-in-out;
        }

        .password-content {
            background: rgba(255, 255, 255, 0.95);
            max-width: 500px;
            margin: 15% auto;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: zoomIn 0.5s ease-in-out;
            border: 2px solid #25D366;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.5);
        }

        .password-content h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #25D366, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .password-content input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: 2px solid transparent;
            border-radius: 10px;
            background: #ffffff;
            color: #1a1a2e;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .password-content input:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.5);
        }

        .unlock-btn {
            background: linear-gradient(45deg, #25D366, #3498db);
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
            text-transform: uppercase;
        }

        .unlock-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.5);
        }

        .error {
            color: #ff4757;
            font-size: 1rem;
            margin-top: 15px;
            animation: shake 0.5s;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Chatbot Styles */
        .chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .chatbot-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(45deg, #25D366, #3498db);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.7);
            position: relative;
            animation: orbit 4s linear infinite;
        }

        .chatbot-icon::before {
            content: '';
            position: absolute;
            width: 90px;
            height: 90px;
            border: 2px solid rgba(37, 211, 102, 0.3);
            border-radius: 50%;
            animation: orbitGlow 2s ease-in-out infinite;
        }

        @keyframes orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes orbitGlow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .chatbot-icon:hover {
            transform: scale(1.2);
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.9);
        }

        .chatbot-icon svg {
            width: 35px;
            height: 35px;
            fill: white;
            transform: rotate(45deg);
            transition: transform 0.3s ease;
        }

        .chatbot-icon:hover svg {
            transform: rotate(0deg);
        }

        .chat-window {
            width: 360px;
            height: 520px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
            transform: translateY(50px);
            opacity: 0;
            transition: all 0.5s ease;
            position: absolute;
            bottom: 80px;
            right: 0;
            overflow: hidden;
            border: 2px solid #25D366;
        }

        .chat-window.active {
            display: flex;
            transform: translateY(0);
            opacity: 1;
            animation: fadeInUp 0.5s ease;
        }

        .chat-header {
            background: linear-gradient(135deg, #25D366, #3498db);
            color: white;
            padding: 20px;
            border-radius: 25px 25px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header span {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #25D366 #f0f2f5;
        }

        .chat-body::-webkit-scrollbar {
            width: 8px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: #f0f2f5;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background-color: #25D366;
            border-radius: 10px;
        }

        .chat-message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.4s ease;
            border: 1px solid transparent;
            word-wrap: break-word;
        }

        .bot-message {
            background: #e6f0fa;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border-color: #25D366;
        }

        .user-message {
            background: linear-gradient(45deg, #25D366, #3498db);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            color: #fff;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-reply {
            display: inline-block;
            background: #ffffff;
            padding: 10px 18px;
            border-radius: 20px;
            margin: 6px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            border: 1px solid #3498db;
        }

        .quick-reply:hover {
            background: #25D366;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.5);
            border-color: transparent;
            color: #fff;
        }

        .chat-input-container {
            padding: 15px;
            border-top: 1px solid #d1d8e0;
            background: #f0f2f5;
            border-radius: 0 0 25px 25px;
            display: flex;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid transparent;
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
            margin-right: 12px;
            background: #ffffff;
            color: #1a1a2e;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: #25D366;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.5);
        }

        .send-btn {
            background: linear-gradient(45deg, #25D366, #3498db);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .close-btn {
            cursor: pointer;
            padding: 8px;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .close-btn:hover {
            transform: rotate(180deg);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            background: #e6f0fa;
            border-radius: 20px;
            align-self: flex-start;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            margin-bottom: 12px;
        }

        .typing-dot {
            width: 10px;
            height: 10px;
            background: #25D366;
            border-radius: 50%;
            margin: 0 4px;
            animation: orbitDot 1.5s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.3s; }
        .typing-dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes orbitDot {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.3); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .book-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }

            .chat-window {
                width: 320px;
                height: 480px;
                right: 10px;
            }

            .header-container {
                padding: 0 15px;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            .book-details-content {
                margin: 20% 15px;
                padding: 25px;
                max-width: 90%;
            }

            .pagination-bar {
                flex-direction: column;
                padding: 10px;
            }

            .page-info {
                margin: 10px 0;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.8rem;
            }

            .book-card img {
                height: 300px;
            }

            .chat-window {
                width: 300px;
                height: 460px;
                right: 5px;
            }

            .section-title {
                font-size: 2.2rem;
            }

            .search-bar {
                max-width: 100%;
            }

            .pagination-bar {
                padding: 8px;
            }

            .nav-arrow {
                padding: 5px 10px;
            }

            .page-info {
                font-size: 1rem;
            }
            
            .book-details-content {
                padding: 20px;
            }
            
            .password-content {
                padding: 20px;
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- Book Details Modal -->
    <div class="book-details-modal" id="bookDetailsModal">
        <div class="book-details-content">
            <img id="detailImage" src="" alt="">
            <h3 id="detailTitle"></h3>
            <p id="detailAuthor"></p>
            <p id="detailDescription"></p>
            <button class="read-now" onclick="showPasswordModal()">Read Now</button>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="password-modal" id="passwordModal">
        <div class="password-content">
            <h3>Premium Access Required</h3>
            <input type="password" id="passkeyInput" placeholder="Enter your passkey" aria-label="Passkey">
            <p id="errorMessage" class="error">Invalid Passkey!</p>
            <button class="unlock-btn" onclick="validatePasskey()">Unlock Book</button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">BookHub</div>
            <div class="header-controls">
                <input type="text" class="search-bar" id="searchBar" placeholder="Search books..." aria-label="Search books">
                <nav class="nav-links">
                    <a href="#home" class="active" onclick="scrollToSection('home')">Home</a>
                    <a href="#membership" onclick="scrollToSection('membership')">Membership</a>
                    <a href="#featured" onclick="scrollToSection('featured')">Featured</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <section class="featured-books" id="featured">
            <h2 class="section-title">Featured Collection</h2>
            <div class="book-grid" id="bookGrid"></div>
            <div class="pagination-bar" id="pagination"></div>
        </section>
    </div>

    <!-- Chatbot -->
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-icon" id="chatbotIcon" aria-label="Open chatbot">
            <svg viewBox="0 0 24 24">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
        </div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span>BookHub Assistant</span>
                <div class="close-btn" id="closeChat" aria-label="Close chatbot">×</div>
            </div>
            <div class="chat-body" id="chatBody"></div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="userInput" placeholder="Type your message..." aria-label="Chat input">
                <button class="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Book Data (Newest to Oldest, IDs 16 to 11)
        // Replace FILE_ID_XX with actual Google Drive file IDs from your sharing links
        // Example: For https://drive.google.com/file/d/1aBcDeFgHiJkLmNoPqRsTuVwXyZ/view?usp=sharing,
        // use https://drive.google.com/uc?export=view&id=1aBcDeFgHiJkLmNoPqRsTuVwXyZ
        // Ensure each file's sharing settings are set to "Anyone with the link"
        const books = [
            {
                id: 16,
                title: "Whispers in the Wind",
                author: "Sarah Black",
                image: "https://drive.google.com/uc?export=view&id=FILE_ID_16",
                redirectUrl: "https://mub.me/tartilz",
                description: "A captivating tale of love and mystery set against a backdrop of stormy seas."
            },
            {
                id: 15,
                title: "Echoes of Time",
                author: "Michael Green",
                image: "https://drive.google.com/uc?export=view&id=FILE_ID_15",
                redirectUrl: "https://mub.me/tartilz",
                description: "A thrilling sci-fi adventure exploring the boundaries of time and space."
            },
            {
                id: 14,
                title: "Secrets of the Deep",
                author: "Emily White",
                image: "https://drive.google.com/uc?export=view&id=FILE_ID_14",
                redirectUrl: "https://mub.me/tartilz",
                description: "Dive into an underwater world filled with secrets and ancient mysteries."
            },
            {
                id: 13,
                title: "Journey to the Stars",
                author: "Alex Brown",
                image: "https://drive.google.com/uc?export=view&id=FILE_ID_13",
                redirectUrl: "https://mub.me/tartilz",
                description: "An epic space odyssey about humanity's quest for the stars."
            },
            {
                id: 12,
                title: "Mystery of the Night",
                author: "Jane Smith",
                image: "https://drive.google.com/uc?export=view&id=FILE_ID_12",
                redirectUrl: "https://mub.me/tartilz",
                description: "A gripping mystery that unfolds under the cover of darkness."
            },
            {
                id: 11,
                title: "The Great Adventure",
                author: "John Doe",
                image: "https://drive.google.com/uc?export=view&id=FILE_ID_11",
                redirectUrl: "https://mub.me/tartilz",
                description: "A true story of courage and exploration in uncharted territories."
            }
        ].sort((a, b) => b.id - a.id); // Sort by ID descending (newest first)

        // Pagination Variables
        const booksPerPage = 4;
        let currentPage = 1;
        let filteredBooks = [...books];
        const bookGrid = document.getElementById('bookGrid');
        const pagination = document.getElementById('pagination');

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            displayBooks(currentPage);
            addRippleEffect();
        });

        // Display Books for Current Page
        function displayBooks(page) {
            bookGrid.classList.remove('active');
            
            // Clear the grid and show loading state
            bookGrid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; font-size: 1.2rem;">Loading books...</p>';
            
            requestAnimationFrame(() => {
                setTimeout(() => {
                    bookGrid.innerHTML = '';
                    const start = (page - 1) * booksPerPage;
                    const end = start + booksPerPage;
                    const paginatedBooks = filteredBooks.slice(start, end);

                    if (paginatedBooks.length === 0) {
                        bookGrid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; font-size: 1.2rem;">No books found matching your search.</p>';
                    } else {
                        paginatedBooks.forEach(book => {
                            const bookCard = document.createElement('div');
                            bookCard.className = 'book-card animate__animated animate__fadeIn';
                            bookCard.dataset.id = book.id;
                            bookCard.innerHTML = `
                                <img src="${book.image}" alt="${book.title}" onerror="this.src='https://via.placeholder.com/300x350?text=Image+Not+Found';">
                                <div class="book-info">
                                    <h3>${book.title}</h3>
                                    <p>${book.author}</p>
                                    <button class="read-now" onclick="showBookDetails(${book.id})">Read Now</button>
                                </div>
                            `;
                            bookGrid.appendChild(bookCard);
                        });
                    }

                    bookGrid.classList.add('active');
                    updatePaginationDisplay();
                }, 300);
            });
        }

        // Setup and Update Pagination
        function updatePaginationDisplay() {
            const totalPages = Math.ceil(filteredBooks.length / booksPerPage);
            
            // Only show pagination if there are multiple pages
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }
            
            pagination.style.display = 'flex';
            pagination.innerHTML = `
                <button class="nav-arrow" id="prevPage" aria-label="Previous page" ${currentPage === 1 ? 'disabled' : ''}><</button>
                <div class="page-info">
                    Page <span class="current-page">${currentPage}</span> of <span class="total-pages">${totalPages}</span>
                </div>
                <button class="nav-arrow" id="nextPage" aria-label="Next page" ${currentPage === totalPages ? 'disabled' : ''}>></button>
            `;

            document.getElementById('prevPage')?.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayBooks(currentPage);
                }
            });

            document.getElementById('nextPage')?.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    displayBooks(currentPage);
                }
            });
        }

        // Ripple Effect for Buttons
        function addRippleEffect() {
            document.querySelectorAll('.read-now, .unlock-btn').forEach(button => {
                button.addEventListener('click', function(e) {
                    const rect = this.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    ripple.style.left = `${x}px`;
                    ripple.style.top = `${y}px`;
                    this.appendChild(ripple);

                    setTimeout(() => ripple.remove(), 600);
                });
            });
        }

        // Search Functionality
        const searchBar = document.getElementById('searchBar');
        searchBar.addEventListener('input', debounce(() => {
            const query = searchBar.value.trim().toLowerCase();
            filteredBooks = books.filter(book =>
                book.title.toLowerCase().includes(query) ||
                book.author.toLowerCase().includes(query)
            );
            currentPage = 1;
            displayBooks(currentPage);
        }, 300));

        // Debounce Function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Navigation Scroll
        function scrollToSection(sectionId) {
            const navLinks = document.querySelectorAll('.nav-links a');
            navLinks.forEach(link => link.classList.remove('active'));
            document.querySelector(`a[href="#${sectionId}"]`).classList.add('active');

            if (sectionId === 'home') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (sectionId === 'featured') {
                document.getElementById('featured').scrollIntoView({ behavior: 'smooth' });
            } else if (sectionId === 'membership') {
                alert('Membership section coming soon!');
            }
        }

        // Book Details Modal
        const bookDetailsModal = document.getElementById('bookDetailsModal');
        let currentBookId = null;

        function showBookDetails(bookId) {
            const book = books.find(b => b.id === bookId);
            if (book) {
                currentBookId = bookId;
                document.getElementById('detailImage').src = book.image;
                document.getElementById('detailImage').alt = book.title;
                document.getElementById('detailTitle').textContent = book.title;
                document.getElementById('detailAuthor').textContent = `by ${book.author}`;
                document.getElementById('detailDescription').textContent = book.description;
                bookDetailsModal.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        }

        // Password Modal Logic
        const passwordModal = document.getElementById('passwordModal');
        const passkeyInput = document.getElementById('passkeyInput');
        const errorMessage = document.getElementById('errorMessage');

        function showPasswordModal() {
            bookDetailsModal.style.display = 'none';
            passwordModal.style.display = 'block';
            passkeyInput.value = '';
            errorMessage.style.display = 'none';
            passkeyInput.focus();
        }

        function validatePasskey() {
            const passkey = passkeyInput.value.trim();
            if (passkey.startsWith('T') && passkey.endsWith('7')) {
                const book = books.find(b => b.id === currentBookId);
                if (book) {
                    window.location.href = book.redirectUrl;
                }
            } else {
                errorMessage.style.display = 'block';
                errorMessage.classList.add('animate__animated', 'animate__shakeX');
                passkeyInput.classList.add('error');
                setTimeout(() => {
                    errorMessage.classList.remove('animate__animated', 'animate__shakeX');
                    passkeyInput.classList.remove('error');
                }, 500);
            }
        }

        // Close Modals on Outside Click
        window.onclick = function(event) {
            if (event.target === bookDetailsModal) {
                bookDetailsModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
            if (event.target === passwordModal) {
                passwordModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        // Handle Enter Key for Passkey
        passkeyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validatePasskey();
        });

        // Chatbot Logic
        let chatState = {
            step: 'email',
            email: '',
            problem: '',
            history: []
        };

        const commonProblems = [
            { label: "Passkey not working", value: "passkey" },
            { label: "Membership issues", value: "membership" },
            { label: "Can't access books", value: "access" },
            { label: "Payment problems", value: "payment" },
            { label: "Other issue", value: "other" }
        ];

        // Toggle Chat Window
        const chatbotIcon = document.getElementById('chatbotIcon');
        const chatWindow = document.getElementById('chatWindow');
        const closeChat = document.getElementById('closeChat');

        function openChat() {
            chatWindow.classList.add('active');
            chatbotIcon.style.display = 'none';
            updateChatDisplay();
            if (chatState.history.length === 0) {
                addBotMessage('🚀 Welcome to BookHub Assistant! Please provide your email address:');
            }
        }

        function closeChatWindow() {
            chatWindow.classList.remove('active');
            chatbotIcon.style.display = 'flex';
            chatState.history = [];
            updateChatDisplay();
        }

        chatbotIcon.addEventListener('click', openChat);
        closeChat.addEventListener('click', closeChatWindow);

        // Chat Display
        function updateChatDisplay() {
            const chatBody = document.getElementById('chatBody');
            chatBody.innerHTML = chatState.history.map(msg => `
                <div class="chat-message ${msg.type}-message">
                    ${msg.text}
                </div>
            `).join('');
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function showTypingIndicator() {
            const chatBody = document.getElementById('chatBody');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatBody.appendChild(typingDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
            return typingDiv;
        }

        function hideTypingIndicator(typingDiv) {
            if (typingDiv && typingDiv.parentNode) {
                typingDiv.remove();
            }
        }

        function addBotMessage(text, isQuickReply = false) {
            if (isQuickReply) {
                const quickReplies = commonProblems.map(problem => `
                    <div class="quick-reply" onclick="handleQuickReply('${problem.value}')">
                        ${problem.label}
                    </div>
                `).join('');
                chatState.history.push({
                    type: 'bot',
                    text: text + '<div style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px;">' + quickReplies + '</div>'
                });
            } else {
                chatState.history.push({
                    type: 'bot',
                    text: text
                });
            }
            updateChatDisplay();
        }

        function addUserMessage(text) {
            chatState.history.push({
                type: 'user',
                text: text
            });
            updateChatDisplay();
        }

        function handleQuickReply(value) {
            const problem = commonProblems.find(p => p.value === value);
            if (problem) {
                if (value === 'other') {
                    addUserMessage('I have another issue');
                    const typingDiv = showTypingIndicator();
                    setTimeout(() => {
                        hideTypingIndicator(typingDiv);
                        addBotMessage('Please describe your issue in detail:');
                        chatState.step = 'other_issue';
                    }, 1000);
                } else {
                    addUserMessage(problem.label);
                    chatState.problem = value;
                    const typingDiv = showTypingIndicator();
                    setTimeout(() => {
                        hideTypingIndicator(typingDiv);
                        addBotMessage(`For ${problem.label.toLowerCase()}, please contact support@bookhub.com with your membership details. Anything else I can help with?`, true);
                        chatState.step = 'followup';
                    }, 1500);
                }
            }
        }

        function sendMessage() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value.trim();
            
            if (!message) {
                addBotMessage('Please type a message to continue.');
                return;
            }

            addUserMessage(message);
            userInput.value = '';
            const typingDiv = showTypingIndicator();

            setTimeout(() => {
                hideTypingIndicator(typingDiv);
                if (chatState.step === 'email') {
                    if (message.includes('@')) {
                        chatState.email = message;
                        addBotMessage('Thanks! What issue are you experiencing?', true);
                        chatState.step = 'problem';
                    } else {
                        addBotMessage('Please enter a valid email address:');
                    }
                } else if (chatState.step === 'problem') {
                    handleQuickReply('other');
                } else if (chatState.step === 'other_issue') {
                    addBotMessage(`Thank you for the details. Our team will contact you at ${chatState.email} within 24 hours. Anything else?`, true);
                    chatState.step = 'followup';
                } else if (chatState.step === 'followup') {
                    if (message.toLowerCase().includes('no') || message.toLowerCase().includes('thank')) {
                        addBotMessage('You\'re welcome! Have a great day! 🌟');
                        setTimeout(() => {
                            closeChatWindow();
                        }, 2000);
                    } else {
                        addBotMessage('How else can I assist you?', true);
                    }
                }
            }, 1500);
        }

        // Handle Enter Key in Chat
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
